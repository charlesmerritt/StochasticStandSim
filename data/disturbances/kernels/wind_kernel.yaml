# Fortuin et al. 2023. “Stand characteristics influence damage severity… Hurricane Michael.”
# Stanturf et al. 2007. “Disturbance and coastal forests: a strategic approach to management.”
# Harrington et al. 2000. “Tree regeneration responses ... following a severe tornado in the Georgia Piedmont, USA”
# Sharma et al. 2020 "Long-term effects of catastrophic wind on souther US ..."
# Dickens & Moorhead 2018 - "Assessing Hurricane and Tornade Storm Damaged Forest Stands"


metadata:
  disturbance: wind
  species: loblolly_pine
  region: US_southeast
  unit_convention:
    loss_units: fraction
  notes: >
    Apply these as multiplicative one-time losses to the stand inventory at t_wind.
    Based on stand-level mortality observed in managed loblolly plantations following hurricanes
    (e.g. Hugo, Katrina, Michael). Crown damage, uprooting, and breakage increase with wind speed,
    tree size, and time since thinning. Informed by Stanturf 2007, Fortuin et al. 2022, Sharma et al. 2020, Harrington et  al. 2000, Dickens & Moorhead 2018.

# Severity classes are based on % of trees uprooted or snapped
# Loss distribution: [min, q1, median, q3, max]
sev_classes:
  mild_0_10:
    desc: 0 to 10 percent stem damage
    immediate_loss_range:
      basal_area: [0.00, 0.020, 0.035, 0.050, 0.080]
      volume:     [0.00, 0.020, 0.035, 0.050, 0.080]
      height:     [0.00, 0.01, 0.02, 0.03, 0.05]
      density:    [0.00, 0.030, 0.060, 0.090, 0.140]
  low_10_20:
    desc: 10 to 20 percent stem damage 
    immediate_loss_range:
      basal_area: [0.03, 0.055, 0.080, 0.110, 0.160]
      volume:     [0.03, 0.055, 0.085, 0.120, 0.180]
      height:     [0.01, 0.02, 0.04, 0.06, 0.09]
      density:    [0.05, 0.100, 0.150, 0.220, 0.280]
  moderate_20_50:
    desc: 20 to 50 percent stems damaged (typical inland hurricane or edge zone)
    immediate_loss_range:
      basal_area: [0.08, 0.130, 0.180, 0.240, 0.320]
      volume:     [0.10, 0.160, 0.220, 0.300, 0.400]
      height:     [0.03, 0.06, 0.1, 0.14, 0.2]
      density:    [0.15, 0.230, 0.320, 0.420, 0.550]
  severe_50_80:
    desc: 50 to 80 percent stem damage (severe damage, especially near core winds)
    immediate_loss_range:
      basal_area: [0.20, 0.300, 0.380, 0.480, 0.600]
      volume:     [0.25, 0.350, 0.450, 0.580, 0.720]
      height:     [0.05, 0.1, 0.16, 0.24, 0.32]
      density:    [0.35, 0.480, 0.600, 0.730, 0.850]
  catastrophic_80_100:
    desc: 80 to 100 percent of stems damaged or destroyed (catastrophic loss, core storm zone)
    immediate_loss_range:
      basal_area: [0.40, 0.550, 0.700, 0.850, 0.950]
      volume:     [0.50, 0.680, 0.820, 0.940, 0.990]
      height:     [0.2, 0.3, 0.45, 0.6, 0.8]
      density:    [0.65, 0.780, 0.900, 0.980, 0.995]

modulators:
  age_ht_multiplier:
    young_0_10y: 0.8   # Small, young trees are resilient to wind damage due to flexibility
    mid_10_25y: 1.0
    mature_gt25y: 1.15  # Mature, large trees more vulnerable to windthrow due to leverage
  years_since_thin_multiplier:
    "<=2": 1.25         # Recently thinned stands show increased damage risk
    "3_5": 1.10
    ">=6": 1.00
  soil_saturation_multiplier: # Unused but described in literature
    dry: 1.00
    moist: 1.10
    saturated: 1.25     # Uprooting increases sharply with wet soils
  exposure_class_multiplier: # Unused but described in literature
    sheltered: 0.95
    neutral: 1.00
    exposed: 1.15       # Ridge-facing or windward slopes experience stronger wind effects

application:
  algorithm:
    - determine severity_class from observed or sampled percent_stems_damaged
    - sample each metric loss from severity_class.immediate_loss_range
    - apply modulators:
    - multiply sampled loss by all applicable multipliers
    - clamp each loss to [0.0, 0.95]
    - update_inventory_at_t_wind:
        - BA_new = BA_old * (1.0 - BA_loss)
        - V_new  = V_old  * (1.0 - V_loss)
        - N_new  = N_old  * (1.0 - density_loss)
        - H_new  = H_old  * (1.0 - H_loss)
