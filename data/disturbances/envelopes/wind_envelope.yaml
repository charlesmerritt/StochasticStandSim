modulators:
  young_stand:
    threshold_height_ft: 40
    multiplier_range: [1.0, 1.5]   # scales attack_drop and decay_years
    
  recent_thinning:
    threshold_age_y: 10
    multiplier_range: [1.0, 1.5]   # scales attack_drop and decay_years




application:
  - sample damage_fraction -> bin
  - sample mortality p -> update TPA, BA instantly (separate mortality kernel)
  - compute yearly m_t from ADSR with modulators
  - apply: delta_BA_t := m_t * delta_BA_t_PMRC
  - clamp to [floor, ceiling]
  - stop at cap_after_year or when |m_t - 1| < 1e-3
