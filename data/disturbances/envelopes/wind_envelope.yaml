# Fortuin et al. 2023 (Hurricane Michael); Stanturf et al. 2007; Harrington et al. 2000;
# Sharma et al. 2020; Dickens & Moorhead 2018.

metadata:
  disturbance: wind
  scope: survivors_only
  output: BA_multiplier  # per-year delt BA multiplier
  effect_direction: negative

defaults:
  floor: 0.55
  ceiling: 1.00

